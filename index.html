<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tarik Oliveira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #090c10;
      --surface: #0e1318;
      --border: #1e2a35;
      --text: #dde8f0;
      --muted: #607080;
      --accent: #89c4e1;
      --accent-dim: #4d8aa8;
      --hover-bg: #111c25;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(137,196,225,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Header */
    .header {
      text-align: center;
      padding-bottom: 2.5rem;
      animation: fadeUp 0.7s ease both;
    }

    .avatar {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      margin: 0 auto 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      position: relative;
      overflow: hidden;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(137,196,225,0.15), transparent);
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.1;
    }

    .tagline {
      margin-top: 0.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* Divider */
    .divider {
      width: 32px;
      height: 1px;
      background: var(--accent-dim);
      margin: 1.25rem auto 0;
      opacity: 0.5;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.7s ease both;
    }

    .link-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.25s ease;
    }

    .link-item:hover {
      background: var(--hover-bg);
      border-color: var(--accent-dim);
      transform: translateX(3px);
    }

    .link-item:hover::before {
      transform: scaleY(1);
    }

    .link-item:nth-child(1) { animation-delay: 0.15s; }
    .link-item:nth-child(2) { animation-delay: 0.25s; }
    .link-item:nth-child(3) { animation-delay: 0.35s; }
    .link-item:nth-child(4) { animation-delay: 0.45s; }

    .icon {
      width: 38px;
      height: 38px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }

    .link-item:hover .icon {
      border-color: var(--accent-dim);
    }

    .icon svg {
      width: 18px;
      height: 18px;
      fill: var(--accent);
    }

    .link-text {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .link-label {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .link-sub {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .link-arrow {
      margin-left: auto;
      color: var(--accent-dim);
      font-size: 0.8rem;
      transition: transform 0.2s, color 0.2s;
    }

    .link-item:hover .link-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding-top: 2.5rem;
      font-size: 0.62rem;
      color: var(--border);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: fadeUp 0.7s 0.55s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
